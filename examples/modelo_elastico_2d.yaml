# Archivo de entrada Solidum FEM: Placa en Tensión (Plasticidad Von Mises 2D)

nodes:
  - {id: 1, coords: [0.0, 0.0]}
  - {id: 2, coords: [0.5, 0.0]}
  - {id: 3, coords: [1.0, 0.0]}
  - {id: 4, coords: [0.0, 0.5]}
  - {id: 5, coords: [0.5, 0.5]}
  - {id: 6, coords: [1.0, 0.5]}
  - {id: 7, coords: [0.0, 1.0]}
  - {id: 8, coords: [0.5, 1.0]}
  - {id: 9, coords: [1.0, 1.0]}

materials:
  - id: 1
    type: VonMises2D
    E: 200.0e9
    nu: 0.3
    sigma_y: 250.0e6
    H: 2.0e9
    density: 7850.0   # acero (kg/m³)

elements:
  - {id: 1, type: Quad4, material: 1, thickness: 0.1, nodes: [1, 2, 5, 4]}
  - {id: 2, type: Quad4, material: 1, thickness: 0.1, nodes: [2, 3, 6, 5]}
  - {id: 3, type: Quad4, material: 1, thickness: 0.1, nodes: [4, 5, 8, 7]}
  - {id: 4, type: Quad4, material: 1, thickness: 0.1, nodes: [5, 6, 9, 8]}

boundary_conditions:
  - {node_id: 1, ux: 0.0, uy: 0.0}
  - {node_id: 4, ux: 0.0, uy: 0.0}
  - {node_id: 7, ux: 0.0, uy: 0.0}
  # Imponemos desplazamiento para asegurar que supere el límite elástico
  - {node_id: 3, ux: 0.003, uy: 0.0}
  - {node_id: 6, ux: 0.003, uy: 0.0}
  - {node_id: 9, ux: 0.003, uy: 0.0}

solver:
  type: NonlinearSolver
  num_steps: 10
  max_iter: 15
  adaptive: true
  convergence:
    rtol_force: 1.0e-5
    rtol_disp: 1.0e-5