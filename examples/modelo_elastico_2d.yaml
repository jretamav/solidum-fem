# Archivo de entrada Fenix FEM: Placa en Tracción (Plasticidad Von Mises 2D)

nodes:
  1: [0.0, 0.0]
  2: [0.5, 0.0]
  3: [1.0, 0.0]
  4: [0.0, 0.5]
  5: [0.5, 0.5]
  6: [1.0, 0.5]
  7: [0.0, 1.0]
