  1: [Quad4, 1, 0.1, 1, 2, 5, 4]
  2: [Quad4, 1, 0.1, 2, 3, 6, 5]
  3: [Quad4, 1, 0.1, 4, 5, 8, 7]
  4: [Quad4, 1, 0.1, 5, 6, 9, 8]

boundary_conditions:
  1: {ux: 0.0, uy: 0.0}
  4: {ux: 0.0, uy: 0.0}
  7: {ux: 0.0, uy: 0.0}
  # Imponemos desplazamiento para asegurar que supere el límite elástico
  3: {ux: 0.003, uy: 0.0}
  6: {ux: 0.003, uy: 0.0}
  9: {ux: 0.003, uy: 0.0}

solver:
