# Archivo de entrada Fenix FEM: Ensayo de Plasticidad 1D

nodes:
  - {id: 1, coords: [0.0, 0.0]}
  - {id: 2, coords: [1.0, 0.0]}

materials:
  - id: 1
    type: Elastoplastic1D
    E: 200.0e9
    sigma_y: 250.0e6
    H: 10.0e9

elements:
  - {id: 1, type: Truss2D, material: 1, A: 0.01, nodes: [1, 2]}

boundary_conditions:
  - {node_id: 1, ux: 0.0, uy: 0.0}
  - {node_id: 2, ux: 0.002, uy: 0.0}  # uy fijo, ux es el desplazamiento impuesto

solver:
  type: NonlinearSolver
  num_steps: 10
  max_iter: 15
  adaptive: true
  convergence:
    rtol_force: 1.0e-5
    rtol_disp: 1.0e-5